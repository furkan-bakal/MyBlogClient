<aside class="user-sidebar d-flex flex-column py-4">
  <!-- Title -->
  <div class="px-3 mb-4">
    <h2 class="user-sidebar__title m-0">Categories</h2>
    <p class="user-sidebar__subtitle m-0">Filter by topic</p>
  </div>

  <!-- Category nav -->
  <nav class="flex-grow-1 d-flex flex-column gap-1 px-2" aria-label="Filter by category">
    <button
      type="button"
      class="user-sidebar__link d-flex align-items-center gap-3"
      [class.user-sidebar__link--active]="activeCategoryId() === null"
      (click)="select(null)"
    >
      <span class="material-symbols-outlined" aria-hidden="true">list</span>
      All Posts
    </button>

    @for (cat of categories(); track cat.id) {
      <button
        type="button"
        class="user-sidebar__link d-flex align-items-center gap-3"
        [class.user-sidebar__link--active]="activeCategoryId() === cat.id"
        (click)="select(cat.id)"
      >
        <span class="material-symbols-outlined" aria-hidden="true">{{ getIcon(cat.name) }}</span>
        {{ cat.name }}
      </button>
    }
  </nav>

  <!-- Subscribe CTA -->
  <div class="px-3 pt-3 mt-auto" style="border-top: 1px solid var(--md-outline-variant);">
    <button type="button" class="user-sidebar__subscribe w-100">Subscribe</button>
  </div>
</aside>
