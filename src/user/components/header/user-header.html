<header class="user-header d-flex justify-content-between align-items-center">
  <!-- Brand + Desktop Nav -->
  <div class="d-flex align-items-center gap-4">
    <a routerLink="/home" class="user-header__brand text-decoration-none">
      Furkan Bakal
    </a>
    <nav class="user-header__nav d-none d-md-flex align-items-center gap-3" aria-label="Ana menü">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="user-header__nav-link--active"
          class="user-header__nav-link"
          [attr.aria-label]="item.label"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </div>

  <!-- Search -->
  <div class="user-header__search d-flex align-items-center">
    <label for="article-search" class="visually-hidden">Yazılarda ara</label>
    <span class="material-symbols-outlined user-header__search-icon" aria-hidden="true">search</span>
    <input
      id="article-search"
      type="search"
      class="user-header__search-input"
      placeholder="Yazılarda ara..."
      autocomplete="off"
      [formControl]="searchControl"
      aria-label="Başlık veya içeriğe göre yazı ara"
    />
  </div>
</header>
