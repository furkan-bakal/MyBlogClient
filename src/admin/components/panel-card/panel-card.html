<section class="panel-card h-100 d-flex flex-column p-3 p-md-4">
  <header class="d-flex justify-content-between align-items-center mb-3 mb-md-4">
    <h3 class="panel-card__title d-flex align-items-center gap-2 m-0">
      @if (icon(); as iconName) {
        <span class="material-symbols-outlined panel-card__icon" aria-hidden="true">{{ iconName }}</span>
      }
      {{ title() }}
    </h3>
    <ng-content select="[slot=action]" />
  </header>

  <div class="panel-card__body flex-grow-1">
    <ng-content />
  </div>
</section>
