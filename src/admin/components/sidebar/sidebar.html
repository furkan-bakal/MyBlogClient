<aside class="sidebar d-flex flex-column py-4">
  <!-- Brand -->
  <div class="px-4 mb-4">
    <h1 class="sidebar__brand m-0">Editorial Admin</h1>
    <p class="sidebar__brand-sub m-0">Management Portal</p>
  </div>

  <!-- Primary navigation -->
  <nav class="sidebar__nav flex-grow-1 d-flex flex-column gap-1 px-2" aria-label="Admin navigation">
    @for (item of navItems; track item.path) {
      <a
        class="sidebar__link d-flex align-items-center gap-3"
        [routerLink]="item.path"
        routerLinkActive="sidebar__link--active"
        [attr.aria-label]="item.label"
      >
        <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- User footer -->
  <div class="sidebar__user mt-auto pt-3 mx-3">
    <div class="d-flex align-items-center gap-2">
      <span class="sidebar__avatar d-inline-flex align-items-center justify-content-center" aria-hidden="true">
        AC
      </span>
      <div>
        <div class="sidebar__user-name">Alex Carter</div>
        <div class="sidebar__user-role">Editor in Chief</div>
      </div>
    </div>
  </div>
</aside>
