<form class="editor" [formGroup]="form" (ngSubmit)="save()">
  <!-- Action bar -->
  <div class="editor__bar d-flex align-items-center gap-2 gap-md-3 mb-3 mb-md-4">
    <a routerLink="/admin/categories" class="btn btn-icon d-lg-none" aria-label="Kategorilere dön">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
    </a>
    <span class="editor__bar-title d-lg-none">{{ isEditMode ? 'Kategoriyi Düzenle' : 'Yeni Kategori' }}</span>
    <span class="editor__focus d-none d-lg-inline-flex align-items-center gap-2">{{ isEditMode ? 'Kategoriyi Düzenle' : 'Yeni Kategori' }}</span>

    <div class="d-flex align-items-center gap-2 ms-auto">
      <a routerLink="/admin/categories" class="btn btn-ghost rounded-pill px-3">İptal</a>
      <button type="submit" class="btn btn-primary-md rounded-pill px-3" [disabled]="submitting()">
        {{ submitting() ? 'Kaydediliyor…' : 'Kaydet' }}
      </button>
    </div>
  </div>

  @if (errorMessage(); as message) {
    <p class="editor__error" role="alert">{{ message }}</p>
  }

  <div class="row g-3 g-lg-4">
    <div class="col-12 col-lg-8">
      <div class="editor__surface">
        <input
          type="text"
          class="editor__title"
          placeholder="Kategori adı..."
          formControlName="name"
          aria-label="Kategori adı"
        />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <p class="editor__field-error" role="alert">Ad zorunludur.</p>
        }
      </div>
    </div>
  </div>
</form>
