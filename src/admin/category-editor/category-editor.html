<form class="editor" [formGroup]="form" (ngSubmit)="save()">
  <!-- Action bar -->
  <div class="editor__bar d-flex align-items-center gap-2 gap-md-3 mb-3 mb-md-4">
    <a routerLink="/admin/categories" class="btn btn-icon d-lg-none" aria-label="Back to categories">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
    </a>
    <span class="editor__bar-title d-lg-none">New Category</span>
    <span class="editor__focus d-none d-lg-inline-flex align-items-center gap-2">New Category</span>

    <div class="d-flex align-items-center gap-2 ms-auto">
      <a routerLink="/admin/categories" class="btn btn-ghost rounded-pill px-3">Cancel</a>
      <button type="submit" class="btn btn-primary-md rounded-pill px-3" [disabled]="submitting()">
        {{ submitting() ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </div>

  @if (errorMessage(); as message) {
    <p class="editor__error" role="alert">{{ message }}</p>
  }

  <div class="row g-3 g-lg-4">
    <div class="col-12 col-lg-8">
      <div class="editor__surface">
        <input
          type="text"
          class="editor__title"
          placeholder="Category name..."
          formControlName="name"
          aria-label="Category name"
        />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <p class="editor__field-error" role="alert">A name is required.</p>
        }
      </div>
    </div>
  </div>
</form>
