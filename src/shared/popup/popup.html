@if (open()) {
<div class="modal-backdrop fade show"></div>

<div
  class="modal fade show d-block"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="title() || 'İletişim kutusu'"
  tabindex="-1"
  (click)="onBackdrop()"
  (keydown.escape)="onEscape()"
>
  <div [class]="dialogClass()" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title h5">{{ title() }}</h2>
        @if (dismissable()) {
        <button type="button" class="btn-close" aria-label="Kapat" (click)="close()"></button>
        }
      </div>

      <div class="modal-body">
        <ng-content />
      </div>

      <div class="modal-footer">
        <ng-content select="[popupFooter]" />
      </div>
    </div>
  </div>
</div>
}
